<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Vehicles - Market Guru HP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
            :root {
      --primary: #F97316;
      --primary-hover: #EA580C;
      --secondary: #FF7A00;
      --navy: #0F2B6E;
      --charcoal: #1E293B;
      --text: #1E293B;
      --bg: #F8FAFC;
      --white: #FFFFFF;
      --border: #E2E8F0;
      --muted: #64748B;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --blue-light: #F1F5F9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* NAVBAR */
    .navbar {
      background: var(--gray-bg);
      position: sticky;
      top: 0;
      z-index: 100;
}

    .nav-main {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 20px;
      height: auto; padding: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      margin-right: 40px;
      height: 110px;
      
    }

    .logo img {
      height: 100%;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    .nav-links a {
      color: var(--charcoal);
      font-size: 16px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      color: var(--charcoal);
      background: rgba(15, 43, 110, 0.08);
    }

    .nav-links a.active {
      color: var(--charcoal);
      background: rgba(249, 115, 22, 0.2);
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-outline-white {
      border: 2px solid var(--charcoal);
      color: var(--charcoal);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    /* PROFILE ICON */
    .profile-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(249, 115, 22, 0.15);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .profile-btn:hover {
      background: rgba(249, 115, 22, 0.3);
      transform: scale(1.1);
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 5px;
      z-index: 101;
    }
    .menu-toggle span {
      display: block;
      width: 25px;
      height: 3px;
      background: var(--charcoal);
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    /* MAIN CONTENT */
    .compare-container {
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
    }

    .compare-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .compare-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: var(--charcoal);
    }

    .clear-btn {
      background: var(--white);
      color: var(--charcoal);
      border: 2.5px solid var(--border);
      padding: 0 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--charcoal);
      background: var(--blue-light);
    }

    /* EMPTY STATE */
    .empty-state {
      background: var(--white);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      padding: 60px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--charcoal);
    }

    .empty-state p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .btn-primary {
      background: var(--primary);
      color: #1A1A2E;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 850;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(249, 115, 22, 0.25);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    /* COMPARE GRID */
    .compare-grid-layout {
      background: var(--white);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      overflow-x: auto;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .compare-table th,
    .compare-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .compare-table th {
      background: var(--blue-light);
      color: var(--charcoal);
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 20%;
    }

    .compare-table td {
      width: 26.66%;
      font-size: 15px;
      font-weight: 500;
      vertical-align: top;
    }

    .car-header-cell {
      position: relative;
      text-align: center;
      padding: 24px !important;
    }

    .remove-car-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      transition: all 0.2s;
    }

    .remove-car-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .car-compare-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 14px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, var(--blue-light), var(--white));
    }

    .car-compare-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--charcoal);
      margin-bottom: 8px;
    }

    .car-compare-price {
      font-size: 22px;
      font-weight: 900;
      color: var(--charcoal);
      font-family: 'Barlow Condensed', sans-serif;
    }

    .spec-row {
      background: var(--white);
    }

    .spec-row:nth-child(even) {
      background: #fafafb;
    }

    .feature-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .feature-compare-tag {
      background: var(--blue-light);
      color: var(--charcoal);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .btn-action-cell {
      display: block;
      width: 100%;
      background: var(--charcoal);
      color: var(--white);
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .btn-action-cell:hover {
      background: var(--primary);
      color: #1A1A2E;
    }

    /* FOOTER */
    .footer {
      background: var(--charcoal);
      padding: 40px 20px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: auto;
    }
    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 30px;
    }
    .footer-col-brand .logo {
      display: block;
      margin-bottom: 20px;
      height: 110px;
    }
    .footer-col-brand .logo img {
      height: 100%;
      width: auto;
      display: block;
    }
    .footer-copyright {
      font-size: 13px;
      line-height: 1.8;
      color: #8a9abf;
      font-weight: 500;
      margin-top: 10px;
    }
    
    .footer-col h4 {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
    }
    .footer-col a {
      display: block;
      font-size: 16px;
      color: #e0e5eb;
      margin-bottom: 12px;
      transition: color 0.2s;
      font-weight: 500;
    }
    .footer-col a:hover {
      color: var(--primary);
    }
    
    .quick-links-split {
      display: flex;
      gap: 30px;
    }
    .ql-divider {
      width: 1px;
      background: var(--primary);
      opacity: 0.5;
    }
    .ql-col {
      display: flex;
      flex-direction: column;
    }

    .footer-contact .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .footer-contact .contact-icon {
      width: 20px;
      height: 20px;
      stroke: var(--primary);
      flex-shrink: 0;
    }
    .footer-contact .contact-item a {
      margin-bottom: 0;
      font-size: 15px;
      color: #fff;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    
    .footer-bottom-bar { 
      background: #333; 
      border-radius: 40px; 
      padding: 12px 24px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #bbb;
      font-size: 13px;
      font-weight: 500;
    }
    .fbb-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .fbb-connect-text {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }
    .fbb-socials {
      display: flex;
      gap: 12px;
    }
    .fbb-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      color: #111;
      transition: all 0.3s ease;
    }
    .fbb-socials a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .fbb-socials svg {
      width: 16px !important;
      height: 16px !important;
      fill: currentColor;
    }
    
    .fbb-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .fbb-links a {
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
      font-size: 13px;
      font-weight: 600;
    }
    .fbb-links a:hover {
      color: var(--white);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: var(--charcoal);
      color: #fff;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transform: translateY(100px);
      transition: transform 0.3s ease;
      border-left: 4px solid var(--primary);
    }
    .toast.show {
      transform: translateY(0);
    }

    @media(max-width: 800px) {
      .footer-bottom-bar {
        flex-direction: column;
        gap: 16px;
        border-radius: 16px;
        text-align: center;
      }
      .fbb-left {
        flex-direction: column;
        gap: 10px;
      }
    }

    @media(max-width: 768px) {
      .nav-main {
        justify-content: space-between;
        height: auto; padding: 0 20px;
        position: relative;
      }
      .logo {
        margin-right: 0;
        height: 80px;
      }
      .logo img {
        transform: scale(1.1) translateX(0);
      }
      .menu-toggle {
        display: flex;
      }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        right: 0;
        background: var(--white);
        padding: 20px;
        gap: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        border-top: 1px solid var(--border);
        z-index: 99;
      }
      .nav-links.active {
        display: flex;
      }
      .nav-actions {
        display: none;
        width: 100%;
        position: absolute;
        top: 250px;
        left: 0;
        right: 0;
        background: var(--white);
        padding: 10px 20px 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        z-index: 98;
        border-top: 1px solid var(--border);
        justify-content: center;
      }
      .nav-actions.active {
        display: flex;
      }
      
      .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 6px);
      }
      .menu-toggle.active span:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -6px);
      }
    }
  </style>
</head>

              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.73-1.45L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.966a9.79 9.79 0 0 0-6.979-2.88c-5.439 0-9.865 4.37-9.87 9.8-.001 1.774.475 3.503 1.378 5.027L1.993 21.5l5.59-1.464c-.305-.186-.612-.372-.936-.882zM17.15 14.54c-.28-.14-1.65-.81-1.902-.9-.253-.09-.438-.14-.623.14-.184.28-.714.9-.876 1.09-.162.19-.323.21-.603.07-1.125-.56-1.96-1.03-2.67-2.24-.26-.45-.06-.7.14-.9.18-.18.4-.47.6-.7.2-.23.27-.38.4-.64.13-.26.07-.49-.03-.7-.1-.21-.87-2.1-1.2-2.88-.31-.77-.64-.67-.88-.68-.22-.01-.48-.01-.73-.01-.26 0-.67.1-1.02.48-.35.38-1.35 1.32-1.35 3.22s1.38 3.73 1.58 3.99c.2.26 2.72 4.15 6.59 5.82.92.4 1.64.64 2.2.82.93.3 1.77.26 2.44.16.74-.11 2.28-.93 2.6-1.83.32-.9.32-1.67.22-1.83-.09-.16-.35-.26-.63-.4z"/></svg>

  </footer>

  <div class="toast" id="toast"></div>

  <script src="cars-data.js"></script>
  <script>
    // Responsive Navbar Toggle
    document.addEventListener('DOMContentLoaded', () => {
      const menuToggle = document.getElementById('menu-toggle');
      const navLinks = document.querySelector('.nav-links');
      const navActions = document.querySelector('.nav-actions');
      if (menuToggle) {
        menuToggle.addEventListener('click', () => {
          menuToggle.classList.toggle('active');
          if (navLinks) navLinks.classList.toggle('active');
          if (navActions) navActions.classList.toggle('active');
        });
      }
      renderComparePage();
      checkLoginState();
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function checkLoginState() {
      const currentUser = localStorage.getItem('mg_current_user');
      const loginLink = document.getElementById('nav-login-link');
      const loginBtn = document.getElementById('nav-login-btn');
      if (currentUser && loginLink && loginBtn) {
        loginLink.href = 'customer-dashboard.html';
        loginLink.innerHTML = '<span class="profile-btn" title="My Profile">👤</span>';
      }
    }

    function getCompareList() {
      try {
        return JSON.parse(localStorage.getItem('mg_compare_list')) || [];
      } catch (e) {
        return [];
      }
    }

    function clearAllCompare() {
      localStorage.setItem('mg_compare_list', JSON.stringify([]));
      showToast('🗑️ Comparison list cleared!');
      renderComparePage();
    }

    function removeCompareCar(id) {
      let list = getCompareList();
      list = list.filter(item => item !== id);
      localStorage.setItem('mg_compare_list', JSON.stringify(list));
      showToast('❌ Vehicle removed from comparison');
      renderComparePage();
    }

    function renderComparePage() {
      const contentDiv = document.getElementById('compare-content');
      if (!contentDiv) return;

      const compareList = getCompareList();
      const allCars = mgDB.getUsedCars();
      const comparedCars = allCars.filter(car => compareList.includes(car.id));

      if (comparedCars.length === 0) {
        contentDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚖️</div>
            <h3>No Vehicles Selected for Comparison</h3>
            <p>Select up to 3 vehicles from our inventory to compare them side-by-side by all constraints.</p>
            <a href="buy-cars.html" class="btn-primary">Browse Vehicles</a>
          </div>
        `;
        return;
      }

      // Build Comparison Table
      let tableHtml = `
        <div class="compare-grid-layout">
          <table class="compare-table">
            <thead>
              <tr>
                <th>Vehicle Details</th>
                ${comparedCars.map(car => `
                  <td class="car-header-cell">
                    <button class="remove-car-btn" onclick="removeCompareCar(${car.id})">×</button>
                    <div class="car-compare-img">
                      ${car.image ? `<img src="${car.image}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />` : car.emoji}
                    </div>
                    <div class="car-compare-name">${car.name}</div>
                    <div class="car-compare-price">₹${car.price} Lakh</div>
                  </td>
                `).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `
                  <td style="text-align:center;color:var(--muted);background:#fafafb;vertical-align:middle;padding:40px;">
                    <div style="font-size:32px;margin-bottom:10px;">➕</div>
                    <div style="font-size:13px;font-weight:700;">Add Another Vehicle</div>
                    <a href="buy-cars.html" style="font-size:12px;color:var(--secondary);text-decoration:underline;margin-top:6px;display:block;">Browse inventory</a>
                  </td>
                `).join('')}
              </tr>
            </thead>
            <tbody>
              <tr class="spec-row">
                <th>Price</th>
                ${comparedCars.map(car => `<td><strong>₹${car.price} Lakh</strong></td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Model Year</th>
                ${comparedCars.map(car => `<td>${car.year}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Kilometers Driven</th>
                ${comparedCars.map(car => `<td>${car.km} km</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Fuel Type</th>
                ${comparedCars.map(car => `<td>⛽ ${car.fuel}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Transmission</th>
                ${comparedCars.map(car => `<td>⚙️ ${car.trans}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>No. of Owners</th>
                ${comparedCars.map(car => `<td>👤 ${car.owner} Owner</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>City</th>
                ${comparedCars.map(car => `<td>📍 ${car.city}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Monthly EMI Est.</th>
                ${comparedCars.map(car => `<td>₹${car.emi}/month</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Verification</th>
                ${comparedCars.map(car => `<td>${car.verified ? '✅ Verified Seller' : '❌ Self-listed'}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Key Features</th>
                ${comparedCars.map(car => `
                  <td>
                    <div class="feature-tag-list">
                      ${(car.features || []).map(f => `<span class="feature-compare-tag">${f}</span>`).join('')}
                    </div>
                  </td>
                `).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Description</th>
                ${comparedCars.map(car => `<td style="font-size:13px;color:var(--muted);line-height:1.5;">${car.desc || 'No description available.'}</td>`).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td>-</td>`).join('')}
              </tr>
              <tr class="spec-row">
                <th>Action</th>
                ${comparedCars.map(car => `
                  <td>
                    <a href="car-detail.html?id=${car.id}" class="btn-action-cell">View Details</a>
                  </td>
                `).join('')}
                ${Array(3 - comparedCars.length).fill().map(() => `<td></td>`).join('')}
              </tr>
            </tbody>
          </table>
        </div>
      `;
      contentDiv.innerHTML = tableHtml;
    }
  </script>
</body>
</html>
