<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Cars for Sale - Market Guru HP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#FFCC00;--red-dark:#CC9900;--charcoal:#1A1A2E;--navy:#16213E;
    --steel:#2A3A5C;--silver:#F0F4F8;--white:#FFFFFF;--text:#1A1A2E;
    --muted:#6B7A99;--border:#DDE3EE;--success:#A3D1B1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--text);background:var(--silver);}
  a{text-decoration:none;color:inherit;}

  .navbar {
    background: var(--charcoal);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .nav-main {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; gap: 0;
    padding: 0 20px; height: 90px;
  }
  .logo {
    display: flex;
    align-items: center;
    margin-right: 40px;
    height: 75px;
  }
  .logo img {
    height: 100%;
    width: auto;
    display: block;
    transform: scale(1.35) translateX(-12px);
    transform-origin: left center;
  }
  .nav-links { display: flex; gap: 6px; flex: 1; }
  .nav-links a {
    color: #eee; font-size: 16px; font-weight: 700;
    padding: 8px 16px; border-radius: 6px;
    transition: all 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(255,255,255,0.12); }
  .nav-links a.active { background: rgba(255,204,0,0.25); }
  .btn-red {
    background: var(--red); color: #1A1A2E;
    padding: 10px 24px; border-radius: 8px; font-size: 15px; font-weight: 800;
    cursor: pointer; border: none; transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255, 204, 0, 0.25);
  }
  .btn-red:hover { background: var(--red-dark); transform: translateY(-2px); color: #1A1A2E; box-shadow: 0 6px 15px rgba(255, 204, 0, 0.45); }

  /* BREADCRUMB */
  .breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;font-size:13px;color:var(--muted);}
  .breadcrumb a{color:var(--red);}
  .breadcrumb-inner{max-width:1280px;margin:0 auto;}

  /* LAYOUT */
  .page-layout{max-width:1280px;margin:24px auto;padding:0 20px;display:grid;grid-template-columns:280px 1fr;gap:24px;}

  /* FILTERS SIDEBAR */
  .sidebar{}
  .filter-box{background:var(--white);border-radius:12px;border:1.5px solid var(--border);padding:20px;margin-bottom:16px;}
  .filter-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
  .filter-clear{font-size:11px;color:var(--red);cursor:pointer;}
  .filter-group{margin-bottom:16px;}
  .filter-group h5{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
  .check-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}
  .check-item input{accent-color:var(--red);}
  .check-item label{font-size:13px;cursor:pointer;flex:1;}
  .check-item span{font-size:11px;color:var(--muted);}
  .price-range{display:flex;gap:8px;}
  .price-input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;}
  .price-input:focus{outline:none;border-color:var(--red);}
  .btn-apply{width:100%;padding:10px;background:var(--red);color:#1A1A2E;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

  /* LISTING AREA */
  .listing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .result-count{font-size:14px;color:var(--muted);}
  .result-count strong{color:var(--text);}
  .sort-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);}

  /* ACTIVE FILTERS */
  .active-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .filter-tag{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;}
  .filter-tag button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}

  /* CAR LIST */
  .car-list-item{background:var(--white);border-radius:12px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:16px;display:grid;grid-template-columns:260px 1fr auto;transition:all 0.25s;cursor:pointer;}
  .car-list-item:hover{border-color:transparent;box-shadow:0 8px 32px rgba(0,0,0,0.1);transform:translateY(-2px);}
  .car-list-img{height:200px;background:linear-gradient(135deg,#e8eef5,#ccd4e0);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
  .car-list-img .badge-verified{position:absolute;top:10px;left:10px;background:var(--success);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;}
  .car-list-info{padding:20px;}
  .car-list-name{font-size:18px;font-weight:700;margin-bottom:4px;}
  .car-list-sub{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .car-specs{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .spec-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
  .spec-icon{font-size:14px;}
  .car-features{display:flex;gap:8px;flex-wrap:wrap;}
  .feature-tag{font-size:11px;background:var(--silver);padding:3px 10px;border-radius:4px;color:var(--muted);}
  .car-list-action{padding:20px;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:180px;}
  .car-price-big{font-size:26px;font-weight:800;color:var(--red);}
  .car-emi{font-size:12px;color:var(--muted);margin-top:2px;}
  .btn-details{background:var(--red);color:#1A1A2E;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
  .btn-call{background:transparent;color:var(--text);border:1.5px solid var(--border);padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
  .btn-call:hover{border-color:var(--text);}
  .compare-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:8px;cursor:pointer;}

  /* PAGINATION */
  .pagination{display:flex;justify-content:center;gap:8px;margin:32px 0;}
  .page-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .page-btn.active{background:var(--red);color:#1A1A2E;border-color:var(--red);}
  .page-btn:hover:not(.active){border-color:var(--red);color:var(--red);}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--charcoal);color:#fff;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.3);transform:translateY(100px);transition:transform 0.3s ease;border-left:4px solid var(--red);}
  .toast.show{transform:translateY(0);}
</style>
</head>
<body>

<nav class="navbar">

  <div class="nav-main">
    <a href="index.html" class="logo" id="brand-logo">
      <img src="logo.png" alt="Market Guru HP Logo">
    </a>
    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="buy-cars.html" class="active">Used Cars</a>
      <a href="sell.html">Sell Car</a>
      <a href="about.html">About</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="index.html">Home</a> › Buy Cars › Vadodara
  </div>
</div>

<div class="page-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-box">
      <div class="filter-title">
        Filters
        <span class="filter-clear" onclick="clearAll()">Clear All</span>
      </div>

      <div class="filter-group">
        <h5>Budget</h5>
        <div class="price-range">
          <input class="price-input" placeholder="Min ₹" id="minPrice">
          <input class="price-input" placeholder="Max ₹" id="maxPrice">
        </div>
        <button class="btn-apply" onclick="applyFilters()">Apply</button>
      </div>

      <div class="filter-group">
        <h5>Brand</h5>
        <div class="check-item"><input type="checkbox" id="b1" onchange="applyFilters()"><label for="b1">Maruti Suzuki</label><span>482</span></div>
        <div class="check-item"><input type="checkbox" id="b2" onchange="applyFilters()"><label for="b2">Hyundai</label><span>318</span></div>
        <div class="check-item"><input type="checkbox" id="b3" onchange="applyFilters()"><label for="b3">Honda</label><span>201</span></div>
        <div class="check-item"><input type="checkbox" id="b4" onchange="applyFilters()"><label for="b4">Toyota</label><span>178</span></div>
        <div class="check-item"><input type="checkbox" id="b5" onchange="applyFilters()"><label for="b5">Tata</label><span>234</span></div>
        <div class="check-item"><input type="checkbox" id="b6" onchange="applyFilters()"><label for="b6">Mahindra</label><span>156</span></div>
        <div class="check-item"><input type="checkbox" id="b7" onchange="applyFilters()"><label for="b7">Kia</label><span>89</span></div>
      </div>

      <div class="filter-group">
        <h5>Fuel Type</h5>
        <div class="check-item"><input type="checkbox" id="f1" onchange="applyFilters()"><label for="f1">Petrol</label><span>892</span></div>
        <div class="check-item"><input type="checkbox" id="f2" onchange="applyFilters()"><label for="f2">Diesel</label><span>634</span></div>
        <div class="check-item"><input type="checkbox" id="f3" onchange="applyFilters()"><label for="f3">CNG</label><span>287</span></div>
        <div class="check-item"><input type="checkbox" id="f4" onchange="applyFilters()"><label for="f4">Electric</label><span>54</span></div>
      </div>

      <div class="filter-group">
        <h5>Transmission</h5>
        <div class="check-item"><input type="checkbox" id="t1" onchange="applyFilters()"><label for="t1">Manual</label><span>1,402</span></div>
        <div class="check-item"><input type="checkbox" id="t2" onchange="applyFilters()"><label for="t2">Automatic</label><span>465</span></div>
      </div>

      <div class="filter-group">
        <h5>Year</h5>
        <div class="check-item"><input type="checkbox" id="y1" onchange="applyFilters()"><label for="y1">2022 – 2024</label><span>312</span></div>
        <div class="check-item"><input type="checkbox" id="y2" onchange="applyFilters()"><label for="y2">2020 – 2021</label><span>498</span></div>
        <div class="check-item"><input type="checkbox" id="y3" onchange="applyFilters()"><label for="y3">2018 – 2019</label><span>421</span></div>
        <div class="check-item"><input type="checkbox" id="y4" onchange="applyFilters()"><label for="y4">Before 2018</label><span>637</span></div>
      </div>

      <div class="filter-group">
        <h5>Condition</h5>
        <div class="check-item"><input type="checkbox" id="c1" onchange="applyFilters()"><label for="c1">✓ Verified Cars</label><span>834</span></div>
        <div class="check-item"><input type="checkbox" id="c2" onchange="applyFilters()"><label for="c2">1st Owner</label><span>1,120</span></div>
        <div class="check-item"><input type="checkbox" id="c3" onchange="applyFilters()"><label for="c3">With Warranty</label><span>267</span></div>
      </div>
    </div>
  </aside>

  <!-- LISTING -->
  <main>
    <div class="listing-header">
      <div class="result-count"><strong id="count">2,400+</strong> Buy Cars in Vadodara</div>
      <select class="sort-select" onchange="sortCars(this)">
        <option>Relevance</option>
        <option>Price: Low to High</option>
        <option>Price: High to Low</option>
        <option>Newest First</option>
        <option>Lowest KM</option>
      </select>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div id="carList"></div>

    <div class="pagination">
      <button class="page-btn">‹</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">...</button>
      <button class="page-btn">24</button>
      <button class="page-btn">›</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="cars-data.js"></script>
<script>
let allCars = [];
let filteredCars = [];
let currentPage = 1;
const carsPerPage = 4;

function initPage() {
  allCars = mgDB.getUsedCars();
  parseQueryParams();
  applyFilters();
}

function parseQueryParams() {
  const params = new URLSearchParams(window.location.search);
  
  // Brand
  const brand = params.get('brand');
  if (brand) {
    const brandLower = brand.toLowerCase();
    if (brandLower.includes('maruti')) document.getElementById('b1').checked = true;
    else if (brandLower.includes('hyundai')) document.getElementById('b2').checked = true;
    else if (brandLower.includes('honda')) document.getElementById('b3').checked = true;
    else if (brandLower.includes('toyota')) document.getElementById('b4').checked = true;
    else if (brandLower.includes('tata')) document.getElementById('b5').checked = true;
    else if (brandLower.includes('mahindra')) document.getElementById('b6').checked = true;
    else if (brandLower.includes('kia')) document.getElementById('b7').checked = true;
  }

  // Budget
  const budget = params.get('budget');
  if (budget) {
    if (budget.includes('Under 3') || budget.includes('Under ₹3')) {
      document.getElementById('maxPrice').value = '3';
    } else if (budget.includes('3–5') || budget.includes('3-5')) {
      document.getElementById('minPrice').value = '3';
      document.getElementById('maxPrice').value = '5';
    } else if (budget.includes('5–8') || budget.includes('5-8')) {
      document.getElementById('minPrice').value = '5';
      document.getElementById('maxPrice').value = '8';
    } else if (budget.includes('8–12') || budget.includes('8-12')) {
      document.getElementById('minPrice').value = '8';
      document.getElementById('maxPrice').value = '12';
    } else if (budget.includes('12–20') || budget.includes('12-20')) {
      document.getElementById('minPrice').value = '12';
      document.getElementById('maxPrice').value = '20';
    } else if (budget.includes('Above 20') || budget.includes('Above ₹20')) {
      document.getElementById('minPrice').value = '20';
    }
  }
}

function renderCars() {
  const list = document.getElementById('carList');
  document.getElementById('count').textContent = filteredCars.length;

  if (filteredCars.length === 0) {
    list.innerHTML = `
      <div style="padding:40px; text-align:center; background:#fff; border-radius:12px; border:1.5px solid var(--border)">
        <h3>No cars match your criteria</h3>
        <p style="color:var(--muted); margin-top:8px">Try clearing filters or search query to find more options.</p>
      </div>`;
    renderPagination(0);
    return;
  }

  // Pagination slice
  const startIndex = (currentPage - 1) * carsPerPage;
  const endIndex = startIndex + carsPerPage;
  const visibleCars = filteredCars.slice(startIndex, endIndex);

  list.innerHTML = visibleCars.map(c => `
    <div class="car-list-item" onclick="window.location='car-detail.html?id=${c.id}'">
      <div class="car-list-img" style="background:linear-gradient(135deg,${c.color || '#e8eef5'},#ccd4e0)">
        <span style="font-size:80px">${c.emoji || '🚗'}</span>
        <div class="car-emi" style="position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,0.7); color:#fff; font-size:11px; font-weight:600; padding:3px 8px; border-radius:4px;">₹${c.emi}</div>
        ${c.verified ? '<div class="badge-verified">✓ Verified</div>' : ''}
      </div>
      <div class="car-list-info">
        <div class="car-list-name">${c.name}</div>
        <div class="car-list-sub">${c.year} · ${c.km} km · ${c.owner || '1st Owner'} · ${c.city || 'Vadodara'}</div>
        <div class="car-specs">
          <div class="spec-item"><span class="spec-icon">⛽</span>${c.fuel}</div>
          <div class="spec-item"><span class="spec-icon">⚙️</span>${c.trans}</div>
          <div class="spec-item"><span class="spec-icon">👤</span>${c.owner || '1st Owner'}</div>
          <div class="spec-item"><span class="spec-icon">📍</span>${c.city || 'Vadodara'}</div>
        </div>
        <div class="car-features">
          ${(c.features || []).slice(0, 4).map(f => `<span class="feature-tag">${f}</span>`).join('')}
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:10px">${c.desc || ''}</p>
      </div>
      <div class="car-list-action">
        <div>
          <div class="car-price-big">₹${c.price}L</div>
          <div class="car-emi">EMI ₹${c.emi}/mo</div>
        </div>
        <div style="width:100%">
          <button class="btn-details" onclick="event.stopPropagation();window.location='car-detail.html?id=${c.id}'">View Details</button>
          <button class="btn-call" onclick="event.stopPropagation();contactSeller(${c.id})">📞 Contact</button>
          <div class="compare-check" onclick="event.stopPropagation()">
            <input type="checkbox" id="comp-${c.id}" onchange="toggleCompare(${c.id})">
            <label for="comp-${c.id}">Add to Compare</label>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  renderPagination(filteredCars.length);
}

function renderPagination(totalCount) {
  const totalPages = Math.ceil(totalCount / carsPerPage);
  const container = document.querySelector('.pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5; cursor:default"' : ''}>‹</button>`;
  
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }
  
  html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5; cursor:default"' : ''}>›</button>`;
  
  container.innerHTML = html;
}

function changePage(p) {
  const totalPages = Math.ceil(filteredCars.length / carsPerPage);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderCars();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
  let list = [...allCars];

  // Budget Range Filter
  const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
  const maxPrice = parseFloat(document.getElementById('maxPrice').value) || 999;
  list = list.filter(c => {
    const price = parseFloat(c.price);
    return price >= minPrice && price <= maxPrice;
  });

  // Brand Filters
  const brands = [];
  if (document.getElementById('b1').checked) brands.push('maruti');
  if (document.getElementById('b2').checked) brands.push('hyundai');
  if (document.getElementById('b3').checked) brands.push('honda');
  if (document.getElementById('b4').checked) brands.push('toyota');
  if (document.getElementById('b5').checked) brands.push('tata');
  if (document.getElementById('b6').checked) brands.push('mahindra');
  if (document.getElementById('b7').checked) brands.push('kia');

  if (brands.length > 0) {
    list = list.filter(c => brands.some(b => c.name.toLowerCase().includes(b)));
  }

  // Fuel Filters
  const fuels = [];
  if (document.getElementById('f1').checked) fuels.push('petrol');
  if (document.getElementById('f2').checked) fuels.push('diesel');
  if (document.getElementById('f3').checked) fuels.push('cng');
  if (document.getElementById('f4').checked) fuels.push('electric');

  if (fuels.length > 0) {
    list = list.filter(c => fuels.includes(c.fuel.toLowerCase()));
  }

  // Transmission Filters
  const trans = [];
  if (document.getElementById('t1').checked) trans.push('manual');
  if (document.getElementById('t2').checked) trans.push('automatic');

  if (trans.length > 0) {
    list = list.filter(c => trans.includes(c.trans.toLowerCase()));
  }

  // Condition/Verification Filters
  if (document.getElementById('c1').checked) {
    list = list.filter(c => c.verified === true);
  }
  if (document.getElementById('c2').checked) {
    list = list.filter(c => c.owner.includes('1st'));
  }
  if (document.getElementById('c3').checked) {
    list = list.filter(c => c.year >= 2021); // Warranty proxy
  }

  filteredCars = list;
  currentPage = 1;
  
  // Update tags
  renderActiveFilters();
  renderCars();
}

function renderActiveFilters() {
  const container = document.getElementById('activeFilters');
  const items = [];
  
  if (document.getElementById('minPrice').value || document.getElementById('maxPrice').value) {
    const min = document.getElementById('minPrice').value || '0';
    const max = document.getElementById('maxPrice').value || 'Max';
    items.push(`Budget: ₹${min}-${max}L`);
  }
  
  // Brands
  if (document.getElementById('b1').checked) items.push('Maruti');
  if (document.getElementById('b2').checked) items.push('Hyundai');
  if (document.getElementById('b3').checked) items.push('Honda');
  if (document.getElementById('b4').checked) items.push('Toyota');
  if (document.getElementById('b5').checked) items.push('Tata');
  if (document.getElementById('b6').checked) items.push('Mahindra');
  if (document.getElementById('b7').checked) items.push('Kia');

  // Fuels
  if (document.getElementById('f1').checked) items.push('Petrol');
  if (document.getElementById('f2').checked) items.push('Diesel');
  if (document.getElementById('f3').checked) items.push('CNG');
  if (document.getElementById('f4').checked) items.push('Electric');

  container.innerHTML = items.map(f => `
    <div class="filter-tag">
      ${f}
    </div>
  `).join('');
}

function clearAll() {
  document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  applyFilters();
  showToast('✅ All filters cleared');
}

function sortCars(sel) {
  const val = sel.value;
  if (val === 'Price: Low to High') {
    filteredCars.sort((a,b) => parseFloat(a.price) - parseFloat(b.price));
  } else if (val === 'Price: High to Low') {
    filteredCars.sort((a,b) => parseFloat(b.price) - parseFloat(a.price));
  } else if (val === 'Newest First') {
    filteredCars.sort((a,b) => b.year - a.year);
  } else if (val === 'Lowest KM') {
    filteredCars.sort((a,b) => parseInt(a.km.replace(/[^\d]/g,'')) - parseInt(b.km.replace(/[^\d]/g,'')));
  } else {
    // Relevance (default load order)
    applyFilters();
    return;
  }
  currentPage = 1;
  renderCars();
  showToast('↕️ Sorted cars list');
}

function toggleCompare(id) {
  showToast(`📊 Car Added to comparison panel!`);
}

function contactSeller(id) {
  showToast('📞 Redirecting to contact seller details...');
  setTimeout(() => window.location = 'login.html', 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = function() {
  initPage();
  checkLoginState();
};

// Dynamic login state update
function checkLoginState() {
  const currentUser = localStorage.getItem('mg_current_user');
  if (currentUser) {
    const loginLinks = document.querySelectorAll('a[href="login.html"]');
    loginLinks.forEach(link => {
      link.href = 'customer-dashboard.html';
      const btn = link.querySelector('button');
      if (btn) {
        if (btn.textContent.trim().toLowerCase() === 'login') {
          btn.textContent = 'Dashboard';
        }
      } else {
        if (link.textContent.includes('Login / Register')) {
          link.textContent = 'My Dashboard';
        }
      }
    });
  }
}
</script>
