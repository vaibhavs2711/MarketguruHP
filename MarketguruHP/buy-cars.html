<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Cars for Sale - Market Guru HP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#FFCC00;--red-dark:#CC9900;--charcoal:#1A1A2E;--navy:#16213E;
    --steel:#2A3A5C;--silver:#F0F4F8;--white:#FFFFFF;--text:#1A1A2E;
    --muted:#6B7A99;--border:#DDE3EE;--success:#A3D1B1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--text);background:var(--silver);}
  a{text-decoration:none;color:inherit;}

  .navbar {
    background: var(--charcoal);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .nav-main {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; gap: 0;
    padding: 0 20px; height: 90px;
  }
  .logo {
    display: flex;
    align-items: center;
    margin-right: 40px;
    height: 75px;
  }
  .logo img {
    height: 100%;
    width: auto;
    display: block;
    transform: scale(1.35) translateX(-12px);
    transform-origin: left center;
  }
  .nav-links { display: flex; gap: 6px; flex: 1; }
  .nav-links a {
    color: #eee; font-size: 16px; font-weight: 700;
    padding: 8px 16px; border-radius: 6px;
    transition: all 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(255,255,255,0.12); }
  .nav-links a.active { background: rgba(255,204,0,0.25); }
  .btn-red {
    background: var(--red); color: #1A1A2E;
    padding: 10px 24px; border-radius: 8px; font-size: 15px; font-weight: 800;
    cursor: pointer; border: none; transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255, 204, 0, 0.25);
  }
  .btn-red:hover { background: var(--red-dark); transform: translateY(-2px); color: #1A1A2E; box-shadow: 0 6px 15px rgba(255, 204, 0, 0.45); }

  /* BREADCRUMB */
  .breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;font-size:13px;color:var(--muted);}
  .breadcrumb a{color:var(--red);}
  .breadcrumb-inner{max-width:1280px;margin:0 auto;}

  /* LAYOUT */
  .page-layout{max-width:1280px;margin:24px auto;padding:0 20px;display:grid;grid-template-columns:280px 1fr;gap:24px;}

  /* FILTERS SIDEBAR */
  .sidebar{}
  .filter-box{background:var(--white);border-radius:12px;border:1.5px solid var(--border);padding:20px;margin-bottom:16px;}
  .filter-title{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:0.5px;color:var(--charcoal);}
  .filter-clear{font-size:12px;color:var(--red-dark);cursor:pointer;font-weight:700;transition:color 0.2s;}
  .filter-clear:hover{color:var(--charcoal);}
  .filter-group{margin-bottom:18px;}
  .filter-group h5{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  
  .filter-select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--charcoal);
    background-color: var(--white);
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7A99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .filter-select:focus {
    outline: none;
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
  }
  .filter-select:hover {
    border-color: #cbd5e1;
  }

  /* LISTING AREA */
  .listing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .result-count{font-size:14px;color:var(--muted);}
  .result-count strong{color:var(--text);}
  .sort-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);}

  /* ACTIVE FILTERS */
  .active-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .filter-tag{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;}
  .filter-tag button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}

  /* CAR LIST */
  .car-list-item{background:var(--white);border-radius:12px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:16px;display:grid;grid-template-columns:260px 1fr auto;transition:all 0.25s;cursor:pointer;}
  .car-list-item:hover{border-color:transparent;box-shadow:0 8px 32px rgba(0,0,0,0.1);transform:translateY(-2px);}
  .car-list-img{height:200px;background:linear-gradient(135deg,#e8eef5,#ccd4e0);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
  .car-list-img .badge-verified{position:absolute;top:10px;left:10px;background:var(--success);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;}
  .car-list-info{padding:20px;}
  .car-list-name{font-size:18px;font-weight:700;margin-bottom:4px;}
  .car-list-sub{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .car-specs{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .spec-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
  .spec-icon{font-size:14px;}
  .car-features{display:flex;gap:8px;flex-wrap:wrap;}
  .feature-tag{font-size:11px;background:var(--silver);padding:3px 10px;border-radius:4px;color:var(--muted);}
  .car-list-action{padding:20px;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:180px;}
  .car-price-big{font-size:26px;font-weight:800;color:var(--red);}
  .car-emi{font-size:12px;color:var(--muted);margin-top:2px;}
  .btn-details{background:var(--red);color:#1A1A2E;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
  .btn-call{background:transparent;color:var(--text);border:1.5px solid var(--border);padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
  .btn-call:hover{border-color:var(--text);}
  .compare-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:8px;cursor:pointer;}

  /* PAGINATION */
  .pagination{display:flex;justify-content:center;gap:8px;margin:32px 0;}
  .page-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .page-btn.active{background:var(--red);color:#1A1A2E;border-color:var(--red);}
  .page-btn:hover:not(.active){border-color:var(--red);color:var(--red);}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--charcoal);color:#fff;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.3);transform:translateY(100px);transition:transform 0.3s ease;border-left:4px solid var(--red);}
  .toast.show{transform:translateY(0);}
</style>
</head>
<body>

<nav class="navbar">

  <div class="nav-main">
    <a href="index.html" class="logo" id="brand-logo">
      <img src="logo.png" alt="Market Guru HP Logo">
    </a>
    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="buy-cars.html" class="active">Buy Vehicle</a>
      <a href="sell.html">Sell Vehicles</a>
      <a href="about.html">About</a>
    </div>
  </div>
</nav>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="index.html">Home</a> › Buy Cars › Vadodara
  </div>
</div>

<div class="page-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-box">
      <div class="filter-title">
        Filters
        <span class="filter-clear" onclick="clearAll()">Clear All</span>
      </div>

      <div class="filter-group">
        <h5>Budget</h5>
        <select id="priceSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Budgets</option>
          <option value="1-2">1 to 2 Lakh</option>
          <option value="2-3">2 to 3 Lakh</option>
          <option value="3-5">3 to 5 Lakh</option>
          <option value="5-7">5 to 7 Lakh</option>
          <option value="7+">7+ Lakh</option>
        </select>
      </div>

      <div class="filter-group">
        <h5>Brand</h5>
        <select id="brandSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Brands</option>
          <option value="maruti">Maruti Suzuki</option>
          <option value="hyundai">Hyundai</option>
          <option value="honda">Honda</option>
          <option value="toyota">Toyota</option>
          <option value="tata">Tata</option>
          <option value="mahindra">Mahindra</option>
          <option value="kia">Kia</option>
        </select>
      </div>

      <div class="filter-group">
        <h5>Fuel Type</h5>
        <select id="fuelSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Fuel Types</option>
          <option value="petrol">Petrol</option>
          <option value="diesel">Diesel</option>
          <option value="cng">CNG</option>
          <option value="electric">Electric</option>
        </select>
      </div>

      <div class="filter-group">
        <h5>Transmission</h5>
        <select id="transSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Transmissions</option>
          <option value="manual">Manual</option>
          <option value="automatic">Automatic</option>
        </select>
      </div>

      <div class="filter-group">
        <h5>Year</h5>
        <select id="yearSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Years</option>
          <option value="2022-2024">2022 – 2024</option>
          <option value="2020-2021">2020 – 2021</option>
          <option value="2018-2019">2018 – 2019</option>
          <option value="before-2018">Before 2018</option>
        </select>
      </div>

      <div class="filter-group">
        <h5>Condition</h5>
        <select id="conditionSelect" class="filter-select" onchange="applyFilters()">
          <option value="">All Conditions</option>
          <option value="1st">1st Owner</option>
          <option value="warranty">With Warranty</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- LISTING -->
  <main>
    <div class="listing-header">
      <div class="result-count"><strong id="count">2,400+</strong> Buy Vehicle in Vadodara</div>
      <select class="sort-select" onchange="sortCars(this)">
        <option>Relevance</option>
        <option>Price: Low to High</option>
        <option>Price: High to Low</option>
        <option>Newest First</option>
        <option>Lowest KM</option>
      </select>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div id="carList"></div>

    <div class="pagination">
      <button class="page-btn">‹</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">...</button>
      <button class="page-btn">24</button>
      <button class="page-btn">›</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="cars-data.js"></script>
<script>
let allCars = [];
let filteredCars = [];
let currentPage = 1;
const carsPerPage = 4;

function initPage() {
  allCars = mgDB.getUsedCars();
  parseQueryParams();
  applyFilters();
}

function parseQueryParams() {
  const params = new URLSearchParams(window.location.search);
  
  // Brand
  const brand = params.get('brand');
  if (brand) {
    const brandLower = brand.toLowerCase();
    const brandSel = document.getElementById('brandSelect');
    if (brandLower.includes('maruti')) brandSel.value = 'maruti';
    else if (brandLower.includes('hyundai')) brandSel.value = 'hyundai';
    else if (brandLower.includes('honda')) brandSel.value = 'honda';
    else if (brandLower.includes('toyota')) brandSel.value = 'toyota';
    else if (brandLower.includes('tata')) brandSel.value = 'tata';
    else if (brandLower.includes('mahindra')) brandSel.value = 'mahindra';
    else if (brandLower.includes('kia')) brandSel.value = 'kia';
  }

  // Budget
  const budget = params.get('budget');
  if (budget) {
    const priceSel = document.getElementById('priceSelect');
    if (budget.includes('1-2') || budget.includes('1 to 2') || budget.includes('1to2')) {
      priceSel.value = '1-2';
    } else if (budget.includes('2-3') || budget.includes('2 to 3') || budget.includes('2to3')) {
      priceSel.value = '2-3';
    } else if (budget.includes('3-5') || budget.includes('3 to 5') || budget.includes('3to5')) {
      priceSel.value = '3-5';
    } else if (budget.includes('5-7') || budget.includes('5 to 7') || budget.includes('5to7')) {
      priceSel.value = '5-7';
    } else if (budget.includes('7+') || budget.includes('Above 7') || budget.includes('7+')) {
      priceSel.value = '7+';
    } else if (budget.includes('Under 3') || budget.includes('Under ₹3') || budget.includes('3')) {
      // Fallback maps to closest range
      priceSel.value = '3-5';
    }
  }
}

function renderCars() {
  const list = document.getElementById('carList');
  document.getElementById('count').textContent = filteredCars.length;

  if (filteredCars.length === 0) {
    list.innerHTML = `
      <div style="padding:40px; text-align:center; background:#fff; border-radius:12px; border:1.5px solid var(--border)">
        <h3>No cars match your criteria</h3>
        <p style="color:var(--muted); margin-top:8px">Try clearing filters or search query to find more options.</p>
      </div>`;
    renderPagination(0);
    return;
  }

  // Pagination slice
  const startIndex = (currentPage - 1) * carsPerPage;
  const endIndex = startIndex + carsPerPage;
  const visibleCars = filteredCars.slice(startIndex, endIndex);

  list.innerHTML = visibleCars.map(c => `
    <div class="car-list-item" onclick="window.location='car-detail.html?id=${c.id}'">
      <div class="car-list-img" style="background:linear-gradient(135deg,${c.color || '#e8eef5'},#ccd4e0)">
        <span style="font-size:80px">${c.emoji || '🚗'}</span>
      </div>
      <div class="car-list-info">
        <div class="car-list-name">${c.name}</div>
        <div class="car-list-sub">${c.year} · ${c.km} km · ${c.owner || '1st Owner'} · ${c.city || 'Vadodara'}</div>
        <div class="car-specs">
          <div class="spec-item"><span class="spec-icon">⛽</span>${c.fuel}</div>
          <div class="spec-item"><span class="spec-icon">⚙️</span>${c.trans}</div>
          <div class="spec-item"><span class="spec-icon">👤</span>${c.owner || '1st Owner'}</div>
          <div class="spec-item"><span class="spec-icon">📍</span>${c.city || 'Vadodara'}</div>
        </div>
        <div class="car-features">
          ${(c.features || []).slice(0, 4).map(f => `<span class="feature-tag">${f}</span>`).join('')}
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:10px">${c.desc || ''}</p>
      </div>
      <div class="car-list-action">
        <div>
          <div class="car-price-big">₹${c.price}L</div>
        </div>
        <div style="width:100%">
          <button class="btn-details" onclick="event.stopPropagation();window.location='car-detail.html?id=${c.id}'">View Details</button>
          <button class="btn-call" onclick="event.stopPropagation();contactSeller(${c.id})">📞 Contact</button>
          <div class="compare-check" onclick="event.stopPropagation()">
            <input type="checkbox" id="comp-${c.id}" onchange="toggleCompare(${c.id})">
            <label for="comp-${c.id}">Add to Compare</label>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  renderPagination(filteredCars.length);
}

function renderPagination(totalCount) {
  const totalPages = Math.ceil(totalCount / carsPerPage);
  const container = document.querySelector('.pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5; cursor:default"' : ''}>‹</button>`;
  
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }
  
  html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5; cursor:default"' : ''}>›</button>`;
  
  container.innerHTML = html;
}

function changePage(p) {
  const totalPages = Math.ceil(filteredCars.length / carsPerPage);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderCars();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
  let list = [...allCars];

  // Budget Select Filter
  const priceRange = document.getElementById('priceSelect').value;
  if (priceRange) {
    if (priceRange === '1-2') {
      list = list.filter(c => parseFloat(c.price) >= 1.0 && parseFloat(c.price) <= 2.0);
    } else if (priceRange === '2-3') {
      list = list.filter(c => parseFloat(c.price) >= 2.0 && parseFloat(c.price) <= 3.0);
    } else if (priceRange === '3-5') {
      list = list.filter(c => parseFloat(c.price) >= 3.0 && parseFloat(c.price) <= 5.0);
    } else if (priceRange === '5-7') {
      list = list.filter(c => parseFloat(c.price) >= 5.0 && parseFloat(c.price) <= 7.0);
    } else if (priceRange === '7+') {
      list = list.filter(c => parseFloat(c.price) >= 7.0);
    }
  }

  // Brand Filter
  const brandVal = document.getElementById('brandSelect').value;
  if (brandVal) {
    list = list.filter(c => c.name.toLowerCase().includes(brandVal.toLowerCase()));
  }

  // Fuel Filter
  const fuelVal = document.getElementById('fuelSelect').value;
  if (fuelVal) {
    list = list.filter(c => c.fuel.toLowerCase() === fuelVal.toLowerCase());
  }

  // Transmission Filter
  const transVal = document.getElementById('transSelect').value;
  if (transVal) {
    list = list.filter(c => c.trans.toLowerCase() === transVal.toLowerCase());
  }

  // Year Filter
  const yearVal = document.getElementById('yearSelect').value;
  if (yearVal) {
    if (yearVal === '2022-2024') {
      list = list.filter(c => c.year >= 2022 && c.year <= 2024);
    } else if (yearVal === '2020-2021') {
      list = list.filter(c => c.year >= 2020 && c.year <= 2021);
    } else if (yearVal === '2018-2019') {
      list = list.filter(c => c.year >= 2018 && c.year <= 2019);
    } else if (yearVal === 'before-2018') {
      list = list.filter(c => c.year < 2018);
    }
  }

  // Condition Filter
  const conditionVal = document.getElementById('conditionSelect').value;
  if (conditionVal) {
    if (conditionVal === '1st') {
      list = list.filter(c => c.owner.includes('1st'));
    } else if (conditionVal === 'warranty') {
      list = list.filter(c => c.year >= 2021); // Warranty proxy
    }
  }

  filteredCars = list;
  currentPage = 1;
  
  // Update tags
  renderActiveFilters();
  renderCars();
}

function renderActiveFilters() {
  const container = document.getElementById('activeFilters');
  const items = [];
  
  const priceVal = document.getElementById('priceSelect').value;
  if (priceVal) {
    if (priceVal === '7+') {
      items.push('Budget: 7+ Lakh');
    } else {
      items.push(`Budget: ${priceVal} Lakh`);
    }
  }

  const brandVal = document.getElementById('brandSelect').value;
  if (brandVal) {
    const capBrand = brandVal.charAt(0).toUpperCase() + brandVal.slice(1);
    items.push(`Brand: ${capBrand}`);
  }

  const fuelVal = document.getElementById('fuelSelect').value;
  if (fuelVal) {
    const capFuel = fuelVal.charAt(0).toUpperCase() + fuelVal.slice(1);
    items.push(`Fuel: ${capFuel}`);
  }

  const transVal = document.getElementById('transSelect').value;
  if (transVal) {
    const capTrans = transVal.charAt(0).toUpperCase() + transVal.slice(1);
    items.push(`Trans: ${capTrans}`);
  }

  const yearVal = document.getElementById('yearSelect').value;
  if (yearVal) {
    items.push(`Year: ${yearVal}`);
  }

  const conditionVal = document.getElementById('conditionSelect').value;
  if (conditionVal) {
    if (conditionVal === '1st') {
      items.push('Owner: 1st Owner');
    } else if (conditionVal === 'warranty') {
      items.push('Warranty: Yes');
    }
  }

  container.innerHTML = items.map(f => `
    <div class="filter-tag">
      ${f}
    </div>
  `).join('');
}

function clearAll() {
  document.getElementById('priceSelect').value = '';
  document.getElementById('brandSelect').value = '';
  document.getElementById('fuelSelect').value = '';
  document.getElementById('transSelect').value = '';
  document.getElementById('yearSelect').value = '';
  document.getElementById('conditionSelect').value = '';
  applyFilters();
  showToast('✅ All filters cleared');
}

function sortCars(sel) {
  const val = sel.value;
  if (val === 'Price: Low to High') {
    filteredCars.sort((a,b) => parseFloat(a.price) - parseFloat(b.price));
  } else if (val === 'Price: High to Low') {
    filteredCars.sort((a,b) => parseFloat(b.price) - parseFloat(a.price));
  } else if (val === 'Newest First') {
    filteredCars.sort((a,b) => b.year - a.year);
  } else if (val === 'Lowest KM') {
    filteredCars.sort((a,b) => parseInt(a.km.replace(/[^\d]/g,'')) - parseInt(b.km.replace(/[^\d]/g,'')));
  } else {
    // Relevance (default load order)
    applyFilters();
    return;
  }
  currentPage = 1;
  renderCars();
  showToast('↕️ Sorted cars list');
}

function toggleCompare(id) {
  showToast(`📊 Car Added to comparison panel!`);
}

function contactSeller(id) {
  showToast('📞 Redirecting to contact seller details...');
  setTimeout(() => window.location = 'login.html', 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = function() {
  initPage();
  checkLoginState();
};

// Dynamic login state update
function checkLoginState() {
  const currentUser = localStorage.getItem('mg_current_user');
  if (currentUser) {
    const loginLinks = document.querySelectorAll('a[href="login.html"]');
    loginLinks.forEach(link => {
      link.href = 'customer-dashboard.html';
      const btn = link.querySelector('button');
      if (btn) {
        if (btn.textContent.trim().toLowerCase() === 'login') {
          btn.textContent = 'Dashboard';
        }
      } else {
        if (link.textContent.includes('Login / Register')) {
          link.textContent = 'My Dashboard';
        }
      }
    });
  }
}
</script>
